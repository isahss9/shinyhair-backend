<h2> Como proteger o cabelo do calor:</h2>

<p>
1- Use protetor térmico antes do secador.<br><br>
2- Evite temperaturas muito altas.<br><br>
3- Não use chapinha diariamente.<br><br>
4- Hidrate o cabelo frequentemente.<br><br>
 Isso evita quebra e ressecamento.
</p>
